<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Laboratorio 7</title>

    <!-- Favicon simple usando un emoji -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍪</text></svg>"
    />
  </head>
  <body>
    <h1>Ejercicio 2</h1>

    <p>================================================================</p>
    <h3>Ejercicio 2 : Creacion de formulario en pagina Web</h3>
    <p>================================================================</p>
    <div>Creacion - Formulario</div>

    <div id="formulario-container"></div>
    <div id="resultados"></div>

    <script>
      // Crear elementos del formulario
      const container = document.getElementById("formulario-container");
      const resultados = document.getElementById("resultados");

      // Crear formulario
      const form = document.createElement("form");

      // Campo nombre
      const labelNombre = document.createElement("label");
      labelNombre.textContent = "Nombre";
      const inputNombre = document.createElement("input");
      inputNombre.type = "text";
      inputNombre.id = "nombre";

      // Campo fecha
      const labelFecha = document.createElement("label");
      labelFecha.textContent = "Fecha de nacimiento: ";
      const inputFecha = document.createElement("input");
      inputFecha.type = "date";
      inputFecha.id = "fechaNacimiento";

      // Select Pais
      const labelPais = document.createElement("label");
      labelPais.textContent = "Pais de nacionalidad";
      const selectPais = document.createElement("select");
      selectPais.id = "pais";

      //Opciones del select
      const paises = [
        { value: "es", text: "Argentina" },
        { value: "ct", text: "Catalan" },
        { value: "cl", text: "Colombia" },
        { value: "br", text: "Brasil" },
        { value: "us", text: "EE UU" },
        { value: "es", text: "España" },
        { value: "ec", text: "Ecuador" },
        { value: "mx", text: "Mexico" },
        { value: "pe", text: "Peru" },
        { value: "pt", text: "Portugal" },
        { value: "fr", text: "Francia" },
      ];

      paises.forEach((pais) => {
        const option = document.createElement("option");
        option.value = pais.value;
        option.textContent = pais.value;
        selectPais.appendChild(option);
      });

      // Boton
      const boton = document.createElement("button");
      boton.type = "button";
      boton.textContent = "Mostrar Valores";

      // Agregar elementos al formulario
      form.appendChild(labelNombre);
      form.appendChild(inputNombre);
      form.appendChild(document.createElement("br"));

      form.appendChild(labelFecha);
      form.appendChild(inputFecha);
      form.appendChild(document.createElement("br"));

      form.appendChild(labelPais);
      form.appendChild(selectPais);
      form.appendChild(document.createElement("br"));

      form.appendChild(boton);

      // Agregar formulario al contenedor
      container.appendChild(form);

      // Funcion para mostrar valores
      boton.addEventListener("click", function () {
        // Ejercicio 2: Creación de formulario
        console.log("========================================");
        console.log("Ejercicio 2: Creación de formulario");
        console.log("========================================");

        // Obtener valores
        const nombre = inputNombre.value;
        const fecha = inputFecha.value;
        const paisValor = selectPais.value;
        const paisTexto = selectPais.options[selectPais.selectedIndex].text;

        // Imprimir por pantalla: Lo que vamos a imprimir
        resultados.innerHTML += "<p>Lo que vamos a imprimir: </p>";
        resultados.innerHTML +=
          "<p>1. Valores del formulario (Nombre, Fecha, País)</p>";
        resultados.innerHTML +=
          "<p>2. Propiedades clave de los elementos del formulario</p>";

        // Imprimir por pantalla: Resultado - Valores del formulario
        resultados.innerHTML += "<p>Resultado: </p>";
        resultados.innerHTML += "<h4>Valores del formulario:</h4>";
        resultados.innerHTML += `<p>Nombre: ${nombre}</p>`;
        resultados.innerHTML += `<p>Fecha de nacimiento: ${fecha}</p>`;
        resultados.innerHTML += `<p>País (valor): ${paisValor}</p>`;
        resultados.innerHTML += `<p>País (texto): ${paisTexto}</p>`;

        // Imprimir propiedades clave
        resultados.innerHTML += "<h4>Propiedades clave de los elementos:</h4>";
        resultados.innerHTML += `<p>inputNombre.type: ${inputNombre.type}</p>`;
        resultados.innerHTML += `<p>inputNombre.value: ${inputNombre.value}</p>`;
        resultados.innerHTML += `<p>inputFecha.type: ${inputFecha.type}</p>`;
        resultados.innerHTML += `<p>inputFecha.value: ${inputFecha.value}</p>`;
        resultados.innerHTML += `<p>selectPais.options.length: ${selectPais.options.length}</p>`;
        resultados.innerHTML += `<p>selectPais.selectedIndex: ${selectPais.selectedIndex}</p>`;
        resultados.innerHTML += `<p>selectPais.value: ${selectPais.value}</p>`;

        // Mostrar propiedades clave en consola también
        console.log("=== PROPIEDADES CLAVE ===");
        console.log("inputNombre.type:", inputNombre.type);
        console.log("inputNombre.value:", inputNombre.value);
        console.log("inputFecha.type:", inputFecha.type);
        console.log("inputFecha.value:", inputFecha.value);
        console.log("selectPais.options.length:", selectPais.options.length);
        console.log("selectPais.selectedIndex:", selectPais.selectedIndex);
        console.log("selectPais.value:", selectPais.value);

        // Mostrar todas las opciones del select
        console.log("Opciones del selector:");
        for (let i = 0; i < selectPais.options.length; i++) {
          console.log(
            ` [${i}] value: "${selectPais.options[i].value}", text: "${selectPais.options[i].text}"`
          );
        }
      });
    </script>
  </body>
</html>
